###############################################################################
# slurmdbd.conf — the accounting daemon
#
# IMPORTANT: this file MUST be mode 0600, owned by the 'slurm' user
# (it contains a database password). slurmdbd refuses to start otherwise:
#   sudo chown slurm:slurm /etc/slurm/slurmdbd.conf
#   sudo chmod 600          /etc/slurm/slurmdbd.conf
###############################################################################


# ---- Auth (same munge key as the rest of the cluster) ----------------------
AuthType=auth/munge

# ---- Where slurmdbd listens ------------------------------------------------
DbdHost=localhost
DbdPort=6819

# ---- Process identity / logs -----------------------------------------------
SlurmUser=slurm
DebugLevel=info
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/run/slurmdbd.pid


# ---- Database backend ------------------------------------------------------
# slurmdbd stores everything in MariaDB/MySQL. Create the DB and user once:
#   CREATE DATABASE slurm_acct_db;
#   CREATE USER 'slurm'@'localhost' IDENTIFIED BY '...';
#   GRANT ALL ON slurm_acct_db.* TO 'slurm'@'localhost';
StorageType=accounting_storage/mysql
StorageHost=localhost
StoragePort=3306
StorageUser=slurm
StoragePass=CHANGE_ME_STRONG_PASSWORD
StorageLoc=slurm_acct_db


# ---- Data retention --------------------------------------------------------
# Old records are auto-purged. Tune to taste; a year is comfortable for most
# small clusters and keeps the DB small.
PurgeEventAfter=12months
PurgeJobAfter=12months
PurgeStepAfter=12months
PurgeSuspendAfter=1month
PurgeResvAfter=1month
