###############################################################################
# cgroup.conf — how SLURM uses Linux cgroups to enforce limits
#
# Cgroups are the kernel feature that lets SLURM say:
#   "this job may use ONLY these cores, this much RAM, these GPUs."
# If a job exceeds its memory request, the kernel kills it (OOM).
###############################################################################

# Auto-detect cgroup v1 vs v2 from the running kernel. Modern distros use v2.
CgroupPlugin=autodetect

# What to constrain:
ConstrainCores=yes        # job sees only its allocated cores
ConstrainRAMSpace=yes     # exceeding --mem -> OOM-killed
ConstrainSwapSpace=yes    # no swap escape hatch.
                          # NOTE: takes effect only when the kernel exposes
                          # swap accounting. On Ubuntu 22.04+ under cgroup v2
                          # (which is what this box runs), swap accounting is
                          # enabled by default. On older / cgroup-v1 kernels,
                          # add `swapaccount=1` to the kernel cmdline or this
                          # constraint is silently ignored.
ConstrainDevices=yes      # job sees only its allocated /dev/nvidia* devices

# How much of the requested limit is actually allowed (in %).
# 100 = exact. Some sites set RAM to 105 to absorb small overshoots; we
# keep it strict so misbehaving jobs are caught early.
AllowedRamSpace=100
AllowedSwapSpace=10
