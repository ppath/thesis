###############################################################################
# gres.conf — describes Generic RESources (GPUs and GPU shards)
#
# This file lives ONLY on nodes that actually have the hardware. The
# `Gres=` line in slurm.conf must agree with what's declared here.
#
# WHY this file matters:
#   - It tells SLURM which CPU cores are "close" to which GPU (NUMA).
#     SLURM will then prefer to allocate cores on the same socket as the
#     requested GPU -> faster CPU<->GPU memory transfers.
#   - It tells SLURM about NVLink topology, so multi-GPU jobs get the
#     GPU pair with the fastest interconnect when possible.
###############################################################################


# -----------------------------------------------------------------------------
# GPU auto-detection via NVML
#
# AutoDetect=nvml tells SLURM to probe all NVIDIA GPUs at startup using the
# NVML library. It discovers device files, NUMA-local CPU cores, and NVLink
# topology automatically — no manual Name=gpu lines needed.
#
# YOUR TOPOLOGY (verified with `nvidia-smi topo -m`):
#   Socket 0  ->  GPU0 <--NV12--> GPU1
#   Socket 1  ->  GPU2 <--NV12--> GPU3
#   Cross-socket links go over UPI (slow). SLURM avoids them automatically.
#
# If NVML auto-detection ever needs to be overridden (e.g. after a GPU swap
# or BIOS NUMA reconfiguration), replace this line with explicit entries:
#   Name=gpu Type=h100 File=/dev/nvidia0 Cores=0-15  Links=-1,12,0,0
#   Name=gpu Type=h100 File=/dev/nvidia1 Cores=0-15  Links=12,-1,0,0
#   Name=gpu Type=h100 File=/dev/nvidia2 Cores=16-31 Links=0,0,-1,12
#   Name=gpu Type=h100 File=/dev/nvidia3 Cores=16-31 Links=0,0,12,-1
# -----------------------------------------------------------------------------

AutoDetect=nvml


# -----------------------------------------------------------------------------
# SHARDS — let multiple small jobs share one GPU.
#
# We declare 10 shards per GPU (40 total). A user can request, e.g.,
#   --gres=shard:h100:3
# to claim 3/10 of one GPU. SLURM keeps the user's processes on that GPU
# via CUDA_VISIBLE_DEVICES; the GPU's memory/compute is NOT hard-isolated
# (that requires MIG). So shards are best for trusted, cooperative users.
#
# Tune the count to your workload:
#   10 shards/GPU = ~8 GB memory share each (good for small inference)
#    4 shards/GPU = ~20 GB each (good for medium models)
#    1 shard/GPU  = effectively no sharing (just use --gres=gpu instead)
#
# Cores= is set explicitly here for NUMA locality even though AutoDetect
# handles the parent GPUs — shards are not NVML-discoverable.
# `Cores=` uses SLURM's ABSTRACT core numbering:
#   0-15  = socket 0
#   16-31 = socket 1
# -----------------------------------------------------------------------------

Name=shard Type=h100 Count=10 File=/dev/nvidia0 Cores=0-15
Name=shard Type=h100 Count=10 File=/dev/nvidia1 Cores=0-15
Name=shard Type=h100 Count=10 File=/dev/nvidia2 Cores=16-31
Name=shard Type=h100 Count=10 File=/dev/nvidia3 Cores=16-31
