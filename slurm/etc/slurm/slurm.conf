###############################################################################
# slurm.conf — main SLURM configuration
#
# This file must be IDENTICAL on every node in the cluster (controller +
# all compute nodes). If you ever add a second node, copy this file there.
#
# After editing: run `sudo scontrol reconfigure` (most changes) or restart
# slurmctld + slurmd (changes to NodeName, partitions, plugins).
###############################################################################


# =============================================================================
# CLUSTER IDENTITY
# =============================================================================
# ClusterName: a label used in accounting; pick anything, but don't change it
# later without wiping the accounting DB.
# SlurmctldHost: the hostname of the machine running slurmctld (the "brain").
ClusterName=plast-hpc
SlurmctldHost=enif


# =============================================================================
# AUTHENTICATION
# =============================================================================
# Munge is a lightweight auth daemon. Every node must share the SAME
# /etc/munge/munge.key file. Without munge running, nothing works.
AuthType=auth/munge
CredType=cred/munge


# =============================================================================
# DAEMON SETTINGS — users/ports/log+spool locations
# =============================================================================
# slurmctld runs as the unprivileged 'slurm' user.
# slurmd must run as root (it launches user jobs and sets up cgroups).
SlurmUser=slurm
SlurmdUser=root

SlurmctldPort=6817
SlurmdPort=6818

SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid

SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

# State dirs: SLURM persists job/queue state here. Must be owned by SlurmUser
# and survive reboots — do NOT put on tmpfs.
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd


# =============================================================================
# PROCESS TRACKING & TASK ISOLATION (the "fine-grained" part)
# =============================================================================
# proctrack/cgroup     -> SLURM uses Linux cgroups to track every process a
#                         job spawns (so nothing escapes when the job ends).
# task/affinity        -> pins tasks to specific CPU cores (CPU pinning).
# task/cgroup          -> enforces resource limits via cgroups (memory, GPUs).
# TaskPluginParam=Cores-> bind to whole physical CORES, not threads. This is
#                         what gives you "core-level" resource management.
# ReturnToService      -> 0 = never auto-return; 1 = auto-return after a
#                         non-responsive timeout once the node responds again
#                         with a matching config; 2 = also returns from
#                         admin-initiated DOWN. We use 1: drain reasons set
#                         by an operator stay until the operator clears them.
ProctrackType=proctrack/cgroup
TaskPlugin=task/affinity,task/cgroup
TaskPluginParam=Cores
ReturnToService=1
SlurmctldParameters=enable_configless


# =============================================================================
# SCHEDULER & RESOURCE SELECTION
# =============================================================================
# sched/backfill -> the standard scheduler; lets small jobs run early in
#                   gaps, as long as they don't delay larger queued jobs.
# select/cons_tres -> "consumable trackable resources": SLURM can carve a
#                     node into pieces (cores, memory, GPUs, shards) and
#                     give each job exactly what it asked for.
# CR_Core_Memory   -> cores AND memory are both consumable. A job asking for
#                     8 cores and 32 GB blocks ONLY those resources; the rest
#                     of the node remains available for other jobs.
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory


# =============================================================================
# PRIORITY
# =============================================================================
# multifactor uses the fairshare data that slurmdbd collects. Without this,
# priority/basic (the default) ignores all that fairshare data entirely.
PriorityType=priority/multifactor
PriorityWeightFairshare=100000
PriorityWeightAge=1000
PriorityDecayHalfLife=7-0


# =============================================================================
# GENERIC RESOURCES (GRES)
# =============================================================================
# We declare two GRES types here; their details live in /etc/slurm/gres.conf
#   gpu    -> a whole H100 GPU
#   shard  -> a fraction of a GPU (lets multiple jobs share one H100)
GresTypes=gpu,shard


# =============================================================================
# MPI
# =============================================================================
# PMIx is the modern MPI launcher interface (used by OpenMPI, MPICH, etc.).
# If you don't use MPI, this is harmless.
MpiDefault=pmix


# =============================================================================
# ACCOUNTING (slurmdbd + MariaDB)
# =============================================================================
# This sends every job's resource usage to slurmdbd, which writes to MySQL.
# Lets you run `sacct`, enforce per-user limits, build fairshare, etc.
#
# AccountingStorageEnforce=associations,limits,qos
#   - associations: a user MUST be registered with `sacctmgr` to submit jobs
#   - limits      : enforce per-user/account limits
#   - qos         : enforce QoS rules
# If this feels too strict at first, you can drop "limits,qos" and keep just
# "associations" until you're ready to define limits.
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=localhost
AccountingStoragePort=6819
AccountingStorageEnforce=associations,limits,qos
AccountingStorageTRES=node,cpu,mem,gres/gpu,gres/shard
AccountingStoreFlags=job_comment,job_script

# Per-job resource sampling via cgroups (cheap and accurate).
JobAcctGatherType=jobacct_gather/cgroup
JobAcctGatherFrequency=30


# =============================================================================
# TIMEOUTS & HOUSEKEEPING (sane defaults — you rarely need to touch these)
# =============================================================================
SlurmctldTimeout=120     # seconds before backup ctld would take over
SlurmdTimeout=300        # seconds before a node is marked DOWN
InactiveLimit=0          # do NOT kill idle interactive jobs; users routinely
                         # leave srun --pty sessions parked while reading.
MinJobAge=300            # keep finished jobs in memory 5 min for `squeue`
KillWait=30              # grace period (SIGTERM -> SIGKILL) at job end
Epilog=/etc/slurm/epilog.sh
EpilogMsgTime=2000
MaxJobCount=10000
MaxArraySize=10000


###############################################################################
# NODES
#
# This section describes the physical hardware. The numbers MUST match
# what `slurmd -C` reports on the node (run that command to verify).
#
#   CPUs=64           total logical CPUs (2 sockets * 16 cores * 2 threads)
#   Sockets=2         physical CPU packages
#   CoresPerSocket=16
#   ThreadsPerCore=2  hyper-threading is on; SLURM still allocates whole
#                     cores because of TaskPluginParam=Cores above.
#   RealMemory=515000 RAM in MB that SLURM is ALLOWED to schedule. Must be
#                     <= what `slurmd -C` shows. Run `sudo slurmd -C` before
#                     deployment and adjust this value to match (subtract ~2 GB
#                     OS headroom). If RealMemory > what slurmd reports, the
#                     node will be marked DOWN.
#
#   MemSpecLimit=12288 reserve 12 GB RAM for the OS (in MB).
#                      CoreSpecCount is intentionally NOT set: SLURM picks spec
#                      cores from the highest-numbered abstract cores (30-31),
#                      which are both on socket 1, silently breaking NUMA
#                      locality for GPU2/GPU3. MemSpecLimit alone is enough
#                      headroom for a dual-socket server.
#
#   Gres=gpu:h100:4,shard:h100:40
#                     this node has 4 H100 GPUs, exposed both as 4 whole
#                     GPUs and as 40 shards (10 per GPU). See gres.conf.
#
#   State=UNKNOWN     slurmctld will probe the real state at startup.
###############################################################################
NodeName=enif \
    CPUs=64 \
    Sockets=2 \
    CoresPerSocket=16 \
    ThreadsPerCore=2 \
    RealMemory=515000 \
    MemSpecLimit=12288 \
    Gres=gpu:h100:4,shard:h100:40 \
    State=UNKNOWN


###############################################################################
# PARTITIONS
#
# A partition is a queue. Users submit to it with `sbatch -p main ...`.
# We expose a single partition because `enif` is a single node; partition-level
# blocking of GRES isn't supported in stock SLURM, so a separate "cpu" queue
# would not actually keep GPUs out of it. CPU-only jobs simply omit --gres.
#
#   Default=YES          used when the user doesn't specify -p
#   MaxTime=7-00:00:00   hard wall-time limit per job: 7 days
#   DefaultTime=01:00:00 if user doesn't pass --time, default to 1 hour
#   DefMemPerCPU=4096    if user doesn't pass --mem, give 4 GB per CPU asked
#   MaxMemPerCPU=15700   cap per-CPU memory: schedulable RAM is
#                        RealMemory - MemSpecLimit = 502712 MB / 32 phys cores
#                        ≈ 15710. 15700 leaves the cap honest so an over-large
#                        request fails fast instead of pending forever.
#   DefCpuPerGPU=8       a bare `--gres=gpu:h100:1` gets 8 cores
#   DefMemPerGPU=64G     ...and 64 GB RAM, instead of 1 CPU + 4 GB.
#   OverSubscribe=NO     don't pack multiple jobs onto the same core
###############################################################################
PartitionName=main \
    Nodes=enif \
    Default=YES \
    MaxTime=7-00:00:00 \
    DefaultTime=01:00:00 \
    DefMemPerCPU=4096 \
    MaxMemPerCPU=15700 \
    DefCpuPerGPU=8 \
    DefMemPerGPU=64G \
    OverSubscribe=NO \
    State=UP
